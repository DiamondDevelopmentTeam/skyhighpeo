<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 820" fill="none">
  <style>
    .frame-line { opacity: 0; animation: fade-in .7s .1s ease-out forwards; }
    .ring { opacity: 0; transform-box: fill-box; transform-origin: center; animation: ring-in .9s .18s cubic-bezier(.22,1,.36,1) forwards; }
    .leaf-lobe { opacity: 0; transform-box: fill-box; transform-origin: 50% 100%; animation: leaf-in .72s cubic-bezier(.22,1,.36,1) forwards; }
    .leaf-lobe:nth-child(1) { animation-delay: .22s; }
    .leaf-lobe:nth-child(2), .leaf-lobe:nth-child(3) { animation-delay: .28s; }
    .leaf-lobe:nth-child(4), .leaf-lobe:nth-child(5) { animation-delay: .34s; }
    .leaf-lobe:nth-child(6), .leaf-lobe:nth-child(7) { animation-delay: .4s; }
    .vein { stroke-dasharray: 420; stroke-dashoffset: 420; animation: draw-line .95s .48s cubic-bezier(.22,1,.36,1) forwards; }
    .stem { stroke-dasharray: 110; stroke-dashoffset: 110; animation: draw-line .55s .72s ease-out forwards; }
    .marker { opacity: 0; animation: marker-in .5s .88s ease-out forwards; }
    @keyframes fade-in { to { opacity: 1; } }
    @keyframes ring-in { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
    @keyframes leaf-in { from { opacity: 0; transform: translateY(10px) scaleY(.94); } to { opacity: 1; transform: translateY(0) scaleY(1); } }
    @keyframes draw-line { to { stroke-dashoffset: 0; } }
    @keyframes marker-in { to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .frame-line, .ring, .leaf-lobe, .vein, .stem, .marker { animation: none; opacity: 1; stroke-dashoffset: 0; transform: none; }
    }
  </style>

  <rect x="44" y="44" width="732" height="732" rx="10" fill="#0B1811" stroke="#264634"/>
